<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#131313 url("background_image.png") repeat;
            color:white;
            font-family:"Manrope",sans-serif;
            line-height:1.5;
            font-size:20px;
        }

        .wrapper{
            max-width:600px;
            margin:auto;
            padding:50px 30px;
        }

        /* HEADER */

        header{
            margin-bottom:60px;
        }

        .logo{
            font-family:"Roboto Slab",serif;
            font-size:2.2rem;
            font-weight:700;
            text-transform:uppercase;
            margin-bottom:8px;
        }

        .tagline{
            color:#999;
            font-size:1rem;
        }

        nav{
            margin-top:30px;
        }

        nav a{
            color:white;
            text-decoration:none;
            text-transform:uppercase;
            margin-right:25px;
            font-size:.9rem;
            letter-spacing:.05em;
        }

        nav a:hover{
            text-decoration:underline;
        }

        /* ARTICLE */

        article{
            margin-bottom:80px;
        }

        .post-date{
            color:#999;
            font-size:.9rem;
            margin-bottom:15px;
        }

        h1{
            font-family:"Roboto Slab",serif;
            font-weight:300;
            font-size:3rem;
            margin-bottom:25px;
        }

        .featured-image{
            width:100%;
            margin:35px 0;
        }

        .featured-image img{
            width:100%;
            display:block;
        }

        p{
            margin-bottom:1.4em;
        }

        h2{
            font-family:"Roboto Slab",serif;
            font-weight:300;
            margin:45px 0 15px;
        }

        blockquote{
            border-left:3px solid #666;
            padding-left:20px;
            margin:30px 0;
            color:#bbb;
            font-style:italic;
        }

        /* FOOTER */

        footer{
            border-top:1px solid #333;
            padding-top:40px;
            color:#888;
            font-size:.9rem;
        }

        footer a{
            color:white;
        }
            
        #loginForm {
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
        }
        
        #container {
            display: none;
            background-color: #e8f5e8;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #4CAF50;
        }
        
        input[type="password"] {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 4px;
            margin: 10px;
        }
        
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #0056b3;
        }
        
        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="loginForm">
        <h2>Protected Page Access</h2>
        <p>Please enter the password to view protected content:</p>
        <form id="passwordForm">
            <input type="password" id="passwordInput" placeholder="Enter Password" required>
            <br>
            <button type="button" onclick="validatePassword()">Access Content</button>
        </form>
        <div id="errorMsg" class="error"></div>
    </div>
    
    <div id="container">
        <h2>? Access Granted!</h2>
        <h3>Welcome to TutorialsPoint Protected Content</h3>
        <p>This is your protected content that is now visible after successful authentication.</p>
        <p>You can add any sensitive information or premium content here.</p>
        <button onclick="logout()">Logout</button>
    </div>
    
    <script>
        const correctPassword = "SecurePass123";
        
        function validatePassword() {
            const inputPassword = document.getElementById("passwordInput").value;
            const errorMsg = document.getElementById("errorMsg");
            
            if (inputPassword === correctPassword) {
                // Hide login form and show protected content
                document.getElementById("loginForm").style.display = "none";
                document.getElementById("container").style.display = "block";
                errorMsg.textContent = "";
            } else {
                // Show error message
                errorMsg.textContent = "Incorrect password! Please try again.";
                document.getElementById("passwordInput").value = "";
                document.getElementById("passwordInput").focus();
            }
        }
        
        function logout() {
            // Hide protected content and show login form
            document.getElementById("container").style.display = "none";
            document.getElementById("loginForm").style.display = "block";
            document.getElementById("passwordInput").value = "";
        }
        
        // Allow Enter key to submit
        document.getElementById("passwordInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                validatePassword();
            }
        });
    </script>
</body>
</html>
